name: Update GitHub-Stats SVG
on:
  schedule:
    - cron: '0 * * * *' # Runs hourly
  workflow_dispatch: # Allows you to run it manually
jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate stats SVG
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=aryantiwari009&show_icons=true&theme=radical" > stats.svg
      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stats.svg" && git push)
